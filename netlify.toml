:root {
  font-family: "Manrope", sans-serif;
  color: #3f1731;
  background:
    radial-gradient(circle at top left, rgba(255, 214, 234, 0.95), transparent 28%),
    radial-gradient(circle at bottom right, rgba(255, 236, 244, 0.85), transparent 32%),
    linear-gradient(180deg, #fff9fc 0%, #fff1f7 100%);
  line-height: 1.5;
  font-weight: 400;
  --bg-card: rgba(255, 255, 255, 0.88);
  --bg-strong: #fff6fa;
  --ink-soft: #7f5b73;
  --accent: #dd4f8e;
  --accent-dark: #9b245f;
  --accent-light: #ffd9e9;
  --border: rgba(155, 36, 95, 0.12);
  --shadow: 0 18px 60px rgba(188, 88, 131, 0.13);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input,
textarea {
  font: inherit;
}

button {
  border: none;
  cursor: pointer;
}

input,
textarea {
  width: 100%;
  margin-top: 8px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.94);
  color: #3f1731;
}

textarea {
  resize: vertical;
}

#root {
  min-height: 100vh;
}

.app-shell {
  width: min(1240px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 24px 0 40px;
}

.admin-shell {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: 100vh;
  gap: 22px;
  padding: 20px;
}

.admin-sidebar,
.admin-content,
.admin-sidebar-card,
.status-bar,
.hero-copy,
.hero-panel,
.page-shell,
.section,
.footer,
.auth-panel,
.form-panel,
.empty-card,
.planner-card {
  border: 1px solid var(--border);
  border-radius: 30px;
  background: var(--bg-card);
  box-shadow: var(--shadow);
}

.admin-sidebar {
  display: grid;
  align-content: start;
  gap: 18px;
  padding: 22px;
  background:
    linear-gradient(180deg, rgba(255, 232, 241, 0.95) 0%, rgba(255, 243, 247, 0.95) 100%);
}

.admin-content {
  padding: 10px;
}

.admin-page-shell {
  display: grid;
  gap: 18px;
}

.admin-brand,
.brand-block {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-block h1,
.admin-brand h1,
.section-heading h2,
.section-heading h3,
.hero-copy h2 {
  margin: 0;
  font-family: "Cormorant Garamond", serif;
  letter-spacing: -0.03em;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 56px;
  height: 56px;
  border-radius: 20px;
  color: white;
  font-weight: 800;
  font-size: 1.1rem;
  background: linear-gradient(135deg, #ff7eb5 0%, #b71d69 100%);
}

.brand-logo {
  width: 176px;
  max-width: 100%;
  height: auto;
  display: block;
}

.eyebrow {
  margin: 0 0 4px;
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 20px;
  padding: 18px 22px;
  border: 1px solid var(--border);
  border-radius: 24px;
  background: rgba(255, 248, 251, 0.86);
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow);
}

.nav-links,
.admin-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.nav-links a,
.admin-nav a {
  padding: 10px 14px;
  border-radius: 999px;
  color: var(--ink-soft);
  transition: 0.2s ease;
}

.nav-links a.active,
.nav-links a:hover,
.admin-nav a.active,
.admin-nav a:hover {
  color: white;
  background: var(--accent-dark);
}

.admin-sidebar-card {
  padding: 18px;
}

.admin-sidebar-card strong,
.admin-sidebar-card span {
  display: block;
}

.admin-sidebar-card p {
  color: var(--ink-soft);
  margin-bottom: 0;
}

.status-bar {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding: 18px 22px;
  margin-bottom: 22px;
}

.status-bar p,
.status-side span,
.support-text,
.hero-text,
.footer p,
.info-card p,
.profile-card p,
.shop-card p,
.service-card p,
.testimonial-card p,
.planner-card p,
.empty-card p {
  color: var(--ink-soft);
}

.status-side {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  text-align: right;
}

.hero-section {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 24px;
  padding: 6px 0 14px;
}

.hero-copy {
  padding: 42px;
}

.hero-copy h2 {
  font-size: clamp(3rem, 5vw, 5.3rem);
  line-height: 0.92;
  max-width: 12ch;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin: 28px 0;
}

.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0 22px;
  border-radius: 999px;
  font-weight: 700;
}

.button:disabled {
  opacity: 0.7;
  cursor: wait;
}

.button.primary {
  color: white;
  background: linear-gradient(135deg, #f56ca7 0%, #a91a61 100%);
}

.button.secondary,
.secondary-button {
  color: var(--accent-dark);
  background: var(--accent-light);
}

.metrics-grid,
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
}

.metric-card,
.info-card,
.profile-card,
.shop-card,
.service-card,
.testimonial-card,
.floating-card {
  border: 1px solid var(--border);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.74);
}

.metric-card,
.info-card,
.profile-card,
.shop-card,
.service-card,
.testimonial-card,
.form-panel {
  padding: 22px;
}

.metric-card strong {
  display: block;
  font-size: 1.55rem;
}

.metric-card span {
  color: var(--ink-soft);
}

.hero-panel {
  display: grid;
  gap: 14px;
  padding: 22px;
  background:
    linear-gradient(180deg, rgba(255, 228, 239, 0.95) 0%, rgba(255, 246, 250, 0.92) 100%),
    var(--bg-card);
}

.floating-card {
  padding: 22px;
}

.floating-card span,
.shop-card-header span {
  font-size: 0.8rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}

.floating-card strong,
.shop-card-header strong {
  display: block;
  margin: 8px 0;
  font-size: 1.2rem;
}

.floating-card.dark {
  color: white;
  background: linear-gradient(135deg, #b61967 0%, #6d123d 100%);
}

.floating-card.dark p,
.floating-card.dark span {
  color: rgba(255, 238, 244, 0.95);
}

.floating-card.accent {
  background: linear-gradient(135deg, rgba(255, 219, 235, 0.95), rgba(255, 246, 250, 0.95));
}

.section,
.page-shell,
.footer,
.auth-panel {
  padding: 30px;
  margin-top: 22px;
}

.nested-section {
  margin-top: 18px;
}

.section-heading {
  margin-bottom: 20px;
}

.section-heading.compact {
  margin-bottom: 12px;
}

.section-heading h2 {
  font-size: clamp(2rem, 4vw, 3.5rem);
  line-height: 1;
}

.section-heading h3 {
  font-size: clamp(1.8rem, 3vw, 2.7rem);
  line-height: 1;
}

.highlights-grid,
.cards-grid,
.testimonial-grid,
.admin-grid,
.planner-grid,
.chat-layout {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.admin-grid,
.planner-grid,
.auth-layout,
.chat-layout {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.compact-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.split-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 24px;
}

.tag-grid,
.chip-row,
.tab-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.pill,
.chip,
.tab {
  padding: 9px 14px;
  border-radius: 999px;
  background: #ffe6f0;
  color: var(--accent-dark);
  font-weight: 700;
}

.tab {
  border: 1px solid transparent;
}

.tab.active {
  color: white;
  background: var(--accent-dark);
}

.filter-bar {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}

.profile-card {
  position: relative;
  overflow: hidden;
}

.avatar-badge {
  display: grid;
  place-items: center;
  width: 52px;
  height: 52px;
  border-radius: 18px;
  color: white;
  font-size: 1.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, #ff82b8 0%, #b91f6b 100%);
}

.profile-header,
.shop-card-header,
.service-meta,
.card-footer,
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.profile-list {
  padding-left: 18px;
  color: var(--ink-soft);
}

.privacy-line {
  margin-top: 14px;
  padding: 10px 12px;
  border-radius: 16px;
  background: #fff0f7;
  color: var(--accent-dark);
  font-weight: 700;
}

.profile-card button,
.shop-card button,
.service-card button,
.remove-button,
.secondary-button {
  margin-top: 14px;
  width: 100%;
  min-height: 44px;
  border-radius: 16px;
}

.profile-card button,
.shop-card button,
.service-card button,
.remove-button {
  color: white;
  background: var(--accent-dark);
}

.secondary-button {
  border: 1px solid transparent;
}

.shop-card .card-footer button {
  width: auto;
  min-width: 140px;
  margin-top: 0;
}

.form-panel {
  display: grid;
  gap: 14px;
}

.form-panel label {
  display: block;
  font-weight: 600;
}

.inline-message {
  margin: 0;
  padding: 12px 14px;
  border-radius: 16px;
  color: var(--accent-dark);
  background: #fff0f7;
}

.feature-list {
  margin: 0;
  padding-left: 20px;
  color: var(--ink-soft);
}

.account-summary {
  display: grid;
  gap: 12px;
}

.planner-column,
.planner-list,
.chat-feed {
  display: grid;
  gap: 14px;
}

.planner-card,
.empty-card {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 18px;
  align-items: flex-start;
}

.planner-card strong {
  display: block;
  margin-bottom: 4px;
}

.planner-card span {
  color: var(--accent-dark);
  font-weight: 700;
}

.remove-button {
  width: auto;
  min-width: 96px;
  margin-top: 0;
  padding: 0 14px;
}

.testimonials {
  background:
    linear-gradient(160deg, rgba(182, 25, 103, 0.95), rgba(111, 19, 62, 0.94)),
    var(--bg-card);
}

.testimonials .section-heading h3,
.testimonials .testimonial-card strong,
.testimonials .testimonial-card span,
.testimonials .testimonial-card p,
.testimonials .eyebrow {
  color: white;
}

.testimonial-card {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.15);
}

.footer {
  margin-bottom: 20px;
}

@media (max-width: 980px) {
  .admin-shell,
  .hero-section,
  .split-section,
  .highlights-grid,
  .cards-grid,
  .testimonial-grid,
  .metrics-grid,
  .dashboard-grid,
  .admin-grid,
  .planner-grid,
  .auth-layout,
  .chat-layout,
  .filter-bar,
  .compact-grid {
    grid-template-columns: 1fr 1fr;
  }

  .topbar,
  .footer,
  .status-bar {
    flex-direction: column;
    align-items: flex-start;
  }

  .status-side {
    align-items: flex-start;
    text-align: left;
  }
}

@media (max-width: 680px) {
  .app-shell {
    width: min(100vw - 20px, 100%);
    padding-top: 14px;
  }

  .admin-shell {
    grid-template-columns: 1fr;
    padding: 12px;
  }

  .topbar,
  .status-bar,
  .hero-copy,
  .hero-panel,
  .section,
  .page-shell,
  .footer,
  .auth-panel,
  .admin-sidebar,
  .admin-content,
  .admin-sidebar-card {
    padding: 20px;
    border-radius: 24px;
  }

  .hero-section,
  .split-section,
  .highlights-grid,
  .cards-grid,
  .testimonial-grid,
  .metrics-grid,
  .dashboard-grid,
  .admin-grid,
  .planner-grid,
  .auth-layout,
  .chat-layout,
  .filter-bar,
  .compact-grid {
    grid-template-columns: 1fr;
  }

  .hero-copy h2 {
    max-width: none;
  }

  .brand-logo {
    width: 144px;
  }

  .nav-links,
  .admin-nav {
    gap: 10px;
  }

  .planner-card,
  .empty-card,
  .shop-card .card-footer,
  .profile-header,
  .service-meta,
  .card-footer,
  .footer {
    flex-direction: column;
    align-items: flex-start;
  }

  .shop-card .card-footer button,
  .remove-button {
    width: 100%;
  }
}
